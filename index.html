        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css">
        <title>index</title>
        <link rel ="stylesheet" href="index.css">
        <script src="index.js"></script>
        <script src="./src_js/vanilla-tilt.js"></script>
    </head>
    <body>
        <header>
            <img src="./images/header.jpg" class="banner">
            <a href="#" class="logo">Portfolio</a>
            <div class="bars"></div>
            <nav>
                <ul>
                    <li><a class="active" href="#">Home</a></li>
                    <li><a href="./projects/desc.html">About</a></li>
                    <li><a href="./projects/Projects.html">Projects</a></li>
                    <li><a href="./projects/contact.html">Contact</a></li>
                    <div class="toggle"></div>
                </ul>
            </nav>
        </header>
        <section>
            <div class="container">
                <div class="card">
                    <div class="content">
                        <h2>About</h2><br>

                        <a href="./projects/desc.html">Read More</a>
                    </div>

            </div>
        </section>
        <script>
            const body = document.querySelector('body');
            document.querySelector('.toggle').onclick = function(){
            body.classList.toggle('light')
            }
            window.addEventListener("scroll",function(){
                const header = document.querySelector('header');
                header.classList.toggle('sticky',window.scrollY > 0);
            });
            window.addEventListener("scroll",function(){
                const header = document.querySelector('section');
                header.classList.toggle('sticky',window.scrollY > 0);
            });
            const navigation = document.querySelector('nav');
            document.querySelector('.bars').onclick = function(){
                this.classList.toggle('active');
                navigation.classList.toggle('active');
            }
            document.querySelector('.active').onclick = function(){
                this.classList.toggle('act');
            }
        </script>
    
    </body>
